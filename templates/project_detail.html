{% extends "base.html" %}

{% block content %}
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-layer-group"></i> TaskManager</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/projects" class="nav-item active"><i class="fas fa-project-diagram"></i> Projects</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="nav-avatar">U</div>
                <div class="user-details">
                    <span id="nav-username">User</span>
                    <span class="badge badge-outline" id="nav-role">Role</span>
                </div>
            </div>
            <button id="logout-btn" class="btn-icon"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar project-header">
            <div>
                <a href="/projects" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
                <h2 id="proj-title">Loading...</h2>
                <p id="proj-desc-text" class="text-muted"></p>
            </div>
            <div class="header-actions">
                <button id="btn-add-member" class="btn btn-secondary hidden"><i class="fas fa-user-plus"></i> Members</button>
                <button id="btn-add-task" class="btn btn-primary"><i class="fas fa-plus"></i> Add Task</button>
            </div>
        </header>

        <div class="content-wrapper kanban-wrapper">
            <div class="kanban-board">
                <!-- Todo Column -->
                <div class="kanban-col">
                    <div class="kanban-col-header">
                        <h3>Todo <span class="count" id="count-todo">0</span></h3>
                    </div>
                    <div class="kanban-col-body" id="col-todo" data-status="todo">
                        <!-- Tasks go here -->
                    </div>
                </div>
                
                <!-- In Progress Column -->
                <div class="kanban-col">
                    <div class="kanban-col-header">
                        <h3>In Progress <span class="count" id="count-inprogress">0</span></h3>
                    </div>
                    <div class="kanban-col-body" id="col-in_progress" data-status="in_progress">
                        <!-- Tasks go here -->
                    </div>
                </div>

                <!-- Done Column -->
                <div class="kanban-col">
                    <div class="kanban-col-header">
                        <h3>Done <span class="count" id="count-done">0</span></h3>
                    </div>
                    <div class="kanban-col-body" id="col-done" data-status="done">
                        <!-- Tasks go here -->
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Task Modal Included -->
{% include "task_modal.html" %}

<!-- Members Modal -->
<div id="members-modal" class="modal hidden">
    <div class="modal-content modal-md">
        <div class="modal-header">
            <h3>Project Members</h3>
            <button class="close-modal"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <ul id="members-list" class="members-list">
                <!-- Populated via JS -->
            </ul>
            <div class="add-member-form mt-3">
                <h4>Add New Member</h4>
                <form id="add-member-form" class="flex-form">
                    <input type="email" id="new-member-email" placeholder="User email" required>
                    <button type="submit" class="btn btn-primary">Add</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const PROJECT_ID = {{ project_id }};
</script>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        Auth.requireAuth();
        ProjectDetail.load(PROJECT_ID);
    });
</script>
{% endblock %}
