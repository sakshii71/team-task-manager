{% extends "base.html" %}

{% block content %}
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-layer-group"></i> TaskManager</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/projects" class="nav-item active"><i class="fas fa-project-diagram"></i> Projects</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="nav-avatar">U</div>
                <div class="user-details">
                    <span id="nav-username">User</span>
                    <span class="badge badge-outline" id="nav-role">Role</span>
                </div>
            </div>
            <button id="logout-btn" class="btn-icon"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h2>Projects</h2>
            <button id="btn-create-project" class="btn btn-primary hidden"><i class="fas fa-plus"></i> Create Project</button>
        </header>

        <div class="content-wrapper">
            <div class="projects-grid" id="projects-grid">
                <!-- Populated via JS -->
            </div>
        </div>
    </main>
</div>

<!-- Create Project Modal -->
<div id="project-modal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Create Project</h3>
            <button class="close-modal"><i class="fas fa-times"></i></button>
        </div>
        <form id="project-form">
            <div class="modal-body">
                <div class="form-group">
                    <label>Project Name</label>
                    <input type="text" id="proj-name" required maxlength="100">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="proj-desc" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary close-modal">Cancel</button>
                <button type="submit" class="btn btn-primary">Create</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        Auth.requireAuth();
        Projects.loadAll();
    });
</script>
{% endblock %}
